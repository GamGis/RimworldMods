name: Update workshop stats & deploy

on:
  schedule:
    - cron: "17 6 * * *"   # 매일 06:17 UTC (한국 15:17) 자동 실행
  push:
    branches: [ main ]      # 코드 수정 push 시에도 실행
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write            # stats.json 커밋용
  pages: write               # Pages 배포용
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest Steam stats
        run: python update_stats.py

      - name: Commit stats.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet stats.json; then
            git add stats.json
            git commit -m "chore: refresh workshop stats [skip ci]"
            git push
          else
            echo "No stat changes."
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
